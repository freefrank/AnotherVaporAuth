name: ava
description: "AVA (AnotherVaporAuth) — a Steam authenticator"
publish_to: 'none'
version: 0.59.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.0.0

  # Crypto (maFile PBKDF2+AES-CBC, RSA, HMAC)
  pointycastle: ^4.0.0
  crypto: ^3.0.6
  asn1lib: ^1.5.5

  # Networking (Steam web API)
  dio: ^5.7.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1

  # QR (login direction A render / direction B scan)
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Files / storage
  # file_selector (flutter.dev official) instead of file_picker: file_picker 11
  # ships a built-in-Kotlin Android plugin that fails GeneratedPluginRegistrant
  # compilation in this project. file_selector builds cleanly via Pigeon.
  file_selector: ^1.0.3
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  path: ^1.9.0

  # i18n
  intl: any

  # Biometric / device-credential unlock + secure passkey storage (Keystore)
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4

  # utils
  collection: ^1.19.0
  image: ^4.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# Launcher icons: default to the Neon variant (the in-app logo switches with the
# theme, but OS launcher icons can't change at runtime).
flutter_launcher_icons:
  image_path: "assets/icon/icon_neon.png"
  android: true
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: true
    image_path: "assets/icon/icon_neon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/icon/icon_neon.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icon/

  # Fonts bundled into the build (no runtime download).
  # - Neon theme: Chakra Petch (display) + JetBrains Mono (code, Latin) with
  #   Noto Sans SC (full CJK incl. simplified + traditional) as the CJK fallback.
  # - Pixel theme: Fusion Pixel — full font (Latin + simplified/traditional
  #   Chinese + Japanese kana + Korean), forward-compatible with future locales.
  fonts:
    - family: ChakraPetch
      fonts:
        - asset: assets/fonts/ChakraPetch-Regular.ttf
        - asset: assets/fonts/ChakraPetch-Medium.ttf
          weight: 500
        - asset: assets/fonts/ChakraPetch-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/ChakraPetch-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
    - family: FusionPixel
      fonts:
        - asset: assets/fonts/FusionPixel.ttf
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC.ttf
